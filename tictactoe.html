<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="tictactoe.css">
</head>
<body>
    <header>
        <a class="home-btnTicTacToe" href="projects.html">Go back to projects 🏠︎</a>
    </header>
    <h1>Tic Tac Toe</h1>

    <div class="playerNames">
        <div class="playerName1"></div> 
        <div class="playerName2"></div> 
    </div>

    <div class="score">
        <div class="score1"></div> 
        <div class="score2"></div> 
    </div>
    
    <div class="spelbord">
        <div class="grid">
            <div class="gridblockOne"></div>
            <div class="gridblockTwo"></div>
            <div class="gridblockThree"></div>
            <div class="gridblockFour"></div>
            <div class="gridblockFive"></div>
            <div class="gridblockSix"></div>
            <div class="gridblockSeven"></div>
            <div class="gridblockEight"></div>
            <div class="gridblockNine"></div>
        </div>
    </div>
    
    <main>
        <button class="pvp">Play</button>
    </main>
    
    <footer></footer>    

    <script src="tictactoe.js"></script>
</body>
</html>
